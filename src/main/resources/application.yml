spring:
  application:
    name: lihua-agent

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lihua_agent}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0
      connect-timeout: 5s
      timeout: 5s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

s3:
  client:
    endpoint: ${S3_ENDPOINT:https://s3.amazonaws.com}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:your-bucket}
    accessKey: ${S3_ACCESS_KEY:}
    secretKey: ${S3_SECRET_KEY:}
    publicHost: ${S3_PUBLIC_HOST:https://your-bucket.s3.amazonaws.com}

server:
  port: 8101
  servlet:
    context-path: /api

logging:
  level:
    org.springframework.web: info
    com.bingli.lihuaAgent: info

ai:
  models:
    attachment:
      ttl: 1h
      maxDocumentChars: 20000
      maxImageSizeMb: 10
      maxTextSizeMb: 5
      maxPdfSizeMb: 20
    logRequests: ${AI_LOG_REQUESTS:false}
    logResponses: ${AI_LOG_RESPONSES:false}
    primary:
      enabled: ${AI_PRIMARY_ENABLED:false}
      alias: primary
      baseUrl: ${AI_PRIMARY_BASE_URL:https://api.openai.com/v1}
      apiKey: ${AI_PRIMARY_API_KEY:}
      modelName: ${AI_PRIMARY_MODEL_NAME:gpt-4o-mini}
      timeout: ${AI_PRIMARY_TIMEOUT:30s}
      maxRetries: ${AI_PRIMARY_MAX_RETRIES:1}
    fallbacks:
      - enabled: ${AI_FALLBACK_0_ENABLED:false}
        alias: fallback-0
        baseUrl: ${AI_FALLBACK_0_BASE_URL:https://api.openai.com/v1}
        apiKey: ${AI_FALLBACK_0_API_KEY:}
        modelName: ${AI_FALLBACK_0_MODEL_NAME:gpt-4o-mini}
        timeout: ${AI_FALLBACK_0_TIMEOUT:30s}
        maxRetries: ${AI_FALLBACK_0_MAX_RETRIES:1}
  rag:
    supportedSuffixes:
      - pdf
      - doc
      - docx
      - txt
      - md
    storagePrefix: rag
    defaultChunkSize: 800
    defaultChunkOverlap: 120
    maxFileSizeMb: 20
    retrievalTopK: 5
    async:
      corePoolSize: 2
      maxPoolSize: 4
      queueCapacity: 100
      keepAliveSeconds: 60
    embedding:
      enabled: ${AI_RAG_EMBEDDING_ENABLED:false}
      baseUrl: ${AI_RAG_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      apiKey: ${AI_RAG_EMBEDDING_API_KEY:}
      modelName: ${AI_RAG_EMBEDDING_MODEL:text-embedding-v4}
      vectorDimension: ${AI_RAG_EMBEDDING_DIMENSION:1024}
      batchSize: ${AI_RAG_EMBEDDING_BATCH_SIZE:16}
      timeout: ${AI_RAG_EMBEDDING_TIMEOUT:30s}
      maxRetries: ${AI_RAG_EMBEDDING_MAX_RETRIES:1}
