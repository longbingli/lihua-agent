spring:
  application:
    name: lihua-agent

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lihua-agent
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1314}

  profiles:
    active: dev

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0
      # password: ${REDIS_PASSWORD:}
      connect-timeout: 5s
      timeout: 5s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

############## Sa-Token 配置 ##############
sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

s3:
  client:
    endpoint: ${S3_ENDPOINT:https://s3.amazonaws.com}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:your-bucket}
    accessKey: ${S3_ACCESS_KEY:}
    secretKey: ${S3_SECRET_KEY:}
    publicHost: ${S3_PUBLIC_HOST:https://your-bucket.s3.amazonaws.com}

server:
  port: 8101
  servlet:
    context-path: /api

logging:
  level:
    org.springframework.web: info
    com.bingli.lihuaAgent: info
